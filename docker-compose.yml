services:
  mysql:
    image: mysql:8.4
    container_name: ai-sapere-aude-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_sapere_aude
      MYSQL_USER: ai_sapere
      MYSQL_PASSWORD: ai_sapere_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ai_sapere", "-pai_sapere_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    container_name: ai-sapere-aude-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/ai_sapere_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ai-sapere-aude-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  neo4j_data:
  qdrant_data:
